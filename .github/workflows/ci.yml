name: CI

# Runs the full backend test suite plus the 16-seed regression on every push
# and pull request. Any test failure, a coverage drop below the floor, or a
# single failing regression seed fails the build.

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests + regression (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run test suite with coverage
        run: |
          pytest tests/ -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90

      - name: Wide seed regression (all 16 seeds)
        run: python ../scripts/regress.py

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: backend/coverage.xml
          if-no-files-found: ignore
