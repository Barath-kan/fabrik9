# One service: the single FastAPI process (API + WebSocket + static frontend).
# `docker compose up --build` and open http://localhost:8000
#
# SQLite is the default and needs no external database. To use PostgreSQL,
# override DATABASE_URL (see the commented db service at the bottom for a
# ready-to-uncomment example) — no code changes, one env var.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # SQLite on the named volume by default; override to point at Postgres.
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/fabrik9.db}
      # App-recognized knobs; override from the host env if you want.
      FABRIK_SEED: ${FABRIK_SEED:-1337}
      FABRIK_LOG_LEVEL: ${FABRIK_LOG_LEVEL:-INFO}
    volumes:
      # Persist the default SQLite database across container restarts.
      - fabrik9-data:/data
    restart: unless-stopped

volumes:
  fabrik9-data:

